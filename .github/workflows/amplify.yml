name: Amplify Content

on:
  # Manual trigger for testing / draining on demand.
  workflow_dispatch:
  schedule:
    # Once daily (08:17 UTC): publish the oldest page marked "Ready to
    # Publish", if any. Adjust the time to your timezone as needed.
    - cron: "17 8 * * *"

# The publish step commits auto-generated cover images back to covers/.
permissions:
  contents: write

jobs:
  fetch_publish_content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Keep the token so the run can push the cover commit.
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: npm install

      - name: Fetch and publish content
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          DEVTO_TOKEN: ${{ secrets.DEVTO_TOKEN }}
          USER_TO_EMAIL: ${{ secrets.USER_TO_EMAIL }}
          USER_FROM_EMAIL: ${{ secrets.USER_FROM_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
        run: npm start
